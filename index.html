      (function() {
        var originalFetch = window.fetch;
        var activeFetch = originalFetch;
        try {
          Object.defineProperty(window, 'fetch', {
            configurable: true,
            enumerable: true,
            get: function() {
              return activeFetch;
            },
            set: function(val) {
              activeFetch = val;
            }
          });
        } catch (e) {
          console.error('Failed to patch window.fetch property descriptor:', e);
        }
      })();
    </script>
